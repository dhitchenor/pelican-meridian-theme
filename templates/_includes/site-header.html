<div id="site-header">
  <button id="sidebar-toggle" type="button" aria-label="Open menu" aria-expanded="false" aria-controls="sidebar">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 6h16M4 12h16M4 18h16"/></svg>
  </button>
  {% if AVATAR %}
  <a href="{{ SITEURL }}" class="site-avatar" aria-hidden="true" tabindex="-1">
    <img src="{{ SITEURL }}/{{ AVATAR }}" alt="">
  </a>
  {% endif %}
  <div class="site-header-titles">
    <div class="logo"><a href="{{ SITEURL }}">{{ SITENAME }}</a></div>
    {% if SITESUBTITLE %}<div class="small">{{ SITESUBTITLE }}</div>{% endif %}
  </div>
  <button id="theme-toggle" type="button" aria-label="Switch to light theme" aria-pressed="false">
    <svg class="icon-moon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.8A9 9 0 1 1 11.2 3 7 7 0 0 0 21 12.8z"/></svg>
    <svg class="icon-sun" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>
  </button>
</div>
<div id="sidebar-overlay"></div>
