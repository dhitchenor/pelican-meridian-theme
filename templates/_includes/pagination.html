<div class="pagination">
    {% if articles_page.has_previous() %}
        {% set num = articles_page.previous_page_number() %}
        <a class="page-link" href="{{ SITEURL }}/{{ page_name }}{{ num if num > 1 }}.html">&larr; Prev</a>
    {% endif %}
    <span class="page-status">page {{ articles_page.number }} of {{ articles_paginator.num_pages }}</span>
    {% if articles_page.has_next() %}
        <a class="page-link" href="{{ SITEURL }}/{{ page_name }}{{ articles_page.next_page_number() }}.html">Next &rarr;</a>
    {% endif %}
</div>
